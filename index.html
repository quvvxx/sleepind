<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>메인 화면</title>
    <link rel="stylesheet" href="css\style.css"/>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="logo">
            <img src="images\sleepindLogo.png" alt="로고사진"/>
        </div>

        <div class="home">
            <a href="index.html">
                <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-house-icon lucide-house"
                >
                    <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                    <path
                            d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                    />
                </svg>
                <span>홈</span>
            </a>
        </div>

        <div class="analysis">
            <a href="analysis.html">
                <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-arrow-up-narrow-wide-icon lucide-arrow-up-narrow-wide"
                >
                    <path d="m3 8 4-4 4 4"/>
                    <path d="M7 4v16"/>
                    <path d="M11 12h4"/>
                    <path d="M11 16h7"/>
                    <path d="M11 20h10"/>
                </svg>
                <span>오늘 분석</span>
            </a>
        </div>

        <div class="stats">
            <a href="stats.html">
                <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-chart-no-axes-combined-icon lucide-chart-no-axes-combined"
                >
                    <path d="M12 16v5"/>
                    <path d="M16 14.639V21"/>
                    <path d="M20 10.656V21"/>
                    <path
                            d="m22 3-8.646 8.646a.5.5 0 0 1-.708 0L9.354 8.354a.5.5 0 0 0-.707 0L2 15"
                    />
                    <path d="M4 18.463V21"/>
                    <path d="M8 14.656V21"/>
                </svg>
                <span>통계</span>
            </a>
        </div>

        <div class="report">
            <a href="report.html">
                <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-file-chart-line-icon lucide-file-chart-line"
                >
                    <path
                            d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"
                    />
                    <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
                    <path d="m16 13-3.5 3.5-2-2L8 17"/>
                </svg>
                <span>수면 리포트</span>
            </a>
        </div>

        <div class="settings">
            <a href="settings.html">
                <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-settings-icon lucide-settings"
                >
                    <path
                            d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"
                    />
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <span>설정</span>
            </a>
        </div>

        <div class="imagesleep">
            <img
                    src="images/sleepind-img-removebg-preview.png"
                    alt="사이드바 이미지"
            />
        </div>
    </aside>

    <div class="container">
        <header>
            <div class="hello-box">
                <div class="hello-text">
                    <h1 class="helloContent">안녕하세요, 사용자님!🌙</h1>
                    <p class="helloComment">
                        오늘도 숙면으로 건강한 하루를 시작해보세요.
                    </p>
                </div>
            </div>

            <div class="hello-icons">
                <div class="bell-icon">
                    <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="34"
                            height="34"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#3f384d"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-bell-icon lucide-bell"
                    >
                        <path d="M10.268 21a2 2 0 0 0 3.464 0"/>
                        <path
                                d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"
                        />
                    </svg>
                </div>
                <div class="user-icon">
                    <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="34"
                            height="34"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#3f384d"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-circle-user-round-icon lucide-circle-user-round"
                    >
                        <path d="M17.925 20.056a6 6 0 0 0-11.851.001"/>
                        <circle cx="12" cy="11" r="4"/>
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </div>
            </div>
        </header>

        <main class="content-box">
            <div class="dashboard-box">
                <div class="connect-analysis">
                    <p class="text1">오늘의 수면 상태</p>
                    <h3>어제는 잘 주무셨나요?</h3>
                    <p class="text2">수면 데이터를 입력하고 분석해보세요.</p>
                    <button class="bt">오늘 분석하기 ㅤ→</button>
                </div>


                <div class="wrap-box">
                    <div class="time-box">
                        <h4>최근 수면 시간</h4>
                        <p class="hs"><b>7</b>시간 <b>12</b>분</p>
                        <p class="time">목표 8시간</p>
                        <div class="bar-bg">

                            <div class="bar-fill"></div>

                        </div>
                    </div>

                    <div class="per-box">
                        <h4>목표 달성률</h4>
                        <div class="per-content">
                            <div>
                                <p class="per"><b>75</b>%</p>
                                <p class="month">지난 7월 기준</p>
                            </div>

                            <img src="images/one.png" alt="원형 그래프">
                        </div>
                    </div>
                    <div class="average-box">
                        <h4 class="aver-text">이번 주 평균 수면 시간</h4>
                        <p class="aver"><b>6</b>시간 <b>45</b>분</p>

                        <div class="img-box">
                            <img src="images/month.png" alt="그래프">
                        </div>
                    </div>
                </div>
            </div>

        </main>
        <div class="bottom-card">
            <div class="emotion-box">
                <h4 class="emotion-text">수면 상태</h4>

                <div class="emo-box">
                    <img src="images\emotion.png" alt="표정 이모지">
                    <div class="emo-info">
                        <p class="emotion">보통</p>
                        <p class="emo-ms">어제 수면의 질은<br>보통이에요!</p>
                    </div>
                </div>
            </div>

            <div class="score-box">
                <h4 class="score-text">컨디션 점수</h4>

                <div class="sc-box">
                    <div class="sc-content">
                        <div class="score-info">
                            <p class="score"><b>72</b>점</p>
                            <p class="score-ms">어제보다 +8 상승</p>
                        </div>
                        <img src="images/grf.png" alt="그래프">
                    </div>
                </div>
            </div>

            <div class="recommend-box">
                <h4 class="emotion-text">추천 행동</h4>

                <div class="emo-box">
                    <img src="images\emotion.png" alt="그래프">
                    <div class="rc-info">
                        <p class="rc-ms">잠들기 1시간 전<br>스마트폰 사용을 줄여보세요!</p>
                    </div>
                </div>
            </div>

        </div>
    </div>


</div>

</div>
</body>
</html>
