<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘 분석</title>
    <link rel="stylesheet" href="css\analysis.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">
          <img src="images\sleepindLogo.png" alt="로고사진" />
        </div>

        <div class="home">
          <a href="index.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-house-icon lucide-house"
            >
              <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
              <path
                d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
              />
            </svg>
            <span>홈</span>
          </a>
        </div>

        <div class="analysis">
          <a href="analysis.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-up-narrow-wide-icon lucide-arrow-up-narrow-wide"
            >
              <path d="m3 8 4-4 4 4" />
              <path d="M7 4v16" />
              <path d="M11 12h4" />
              <path d="M11 16h7" />
              <path d="M11 20h10" />
            </svg>
            <span>오늘 분석</span>
          </a>
        </div>

        <div class="stats">
          <a href="stats.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-chart-no-axes-combined-icon lucide-chart-no-axes-combined"
            >
              <path d="M12 16v5" />
              <path d="M16 14.639V21" />
              <path d="M20 10.656V21" />
              <path
                d="m22 3-8.646 8.646a.5.5 0 0 1-.708 0L9.354 8.354a.5.5 0 0 0-.707 0L2 15"
              />
              <path d="M4 18.463V21" />
              <path d="M8 14.656V21" />
            </svg>
            <span>통계</span>
          </a>
        </div>

        <div class="report">
          <a href="report.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-file-chart-line-icon lucide-file-chart-line"
            >
              <path
                d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"
              />
              <path d="M14 2v5a1 1 0 0 0 1 1h5" />
              <path d="m16 13-3.5 3.5-2-2L8 17" />
            </svg>
            <span>수면 리포트</span>
          </a>
        </div>

        <div class="settings">
          <a href="settings.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-settings-icon lucide-settings"
            >
              <path
                d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"
              />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <span>설정</span>
          </a>
        </div>

        <div class="imagesleep">
          <img
            src="images/sleepind-img-removebg-preview.png"
            alt="사이드바 이미지"
          />
        </div>
      </aside>
      <div class="container">
        <div>
          <div class="hello-box">
            <div class="hello-text">
              <h1 class="helloContent">오늘의 수면 데이터 입력</h1>
              <p class="helloComment">
                취침 시간과 기상 시간을 입력하고 분석해보세요.
              </p>
            </div>
            <button class="bt" onclick="location.href = 'report.html'">
              분석 기록 보기
            </button>
          </div>
        </div>
        <main>
          <div class="dashboard-box">
            <div class="connect-analysis">
              <div>
                <p class="text" id="text1">취침 시간</p>
                <div class="sleep-time">
                  <img class="moon" src="images\moonIcon.png" alt="달" />
                  <div class="time-picker">
                    <select>
                      <option>오전</option>
                      <option selected>오후</option>
                    </select>

                    <select>
                      <option>11</option>
                    </select>

                    <span>:</span>

                    <select>
                      <option>30</option>
                    </select>
                  </div>
                </div>
                <p class="text" id="text2">기상 시간</p>
                <div class="wake-time">
                  <img class="moon" src="images\해.png" alt="해" />
                  <div class="time-picker">
                    <select>
                      <option>오후</option>
                      <option selected>오전</option>
                    </select>

                    <select>
                      <option>7</option>
                    </select>

                    <span>:</span>

                    <select>
                      <option>00</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="time">
                <h4>목표 수면 시간</h4>
                <p>8시간 00분</p>
              </div>
              <input type="range" id="slider" min="0" max="12" value="1" />
              <div class="timetime">
                <p class="one">0시간</p>
                <p class="two">12시간</p>
              </div>
              <div class="tip">
                <img src="images/tip.png" alt="팁" />
                <p>
                  매일 같은 시간에 자고 일어나면 수면 리듬을 유지하는 데 도움이
                  돼요!
                </p>
              </div>
            </div>
            <div class="bt-anal">
              <button class="bt2" onclick="location.href = 'report.html'">
                분석하기 ㅤ→
              </button>
              <div class="comment">
                <p>입력한 정보를 바탕으로<br />수면 시간을 분석해 드립니다.</p>
                <img src="images\colud-removebg-preview.png" alt="구름" />
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      const slider = document.getElementById("slider");

      slider.addEventListener("input", () => {
        const value =
          ((slider.value - slider.min) / (slider.max - slider.min)) * 100;

        slider.style.background = `linear-gradient(to right,
      #6c63ff ${value}%,
      #e5e5ef ${value}%)`;
      });
    </script>
  </body>
</html>
